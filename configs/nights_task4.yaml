data:
  image_emb_path: "/sda/yxyang/qsba_workspace/mbeir_aligned/data/nights_task4/image_embeddings.pt"
  text_emb_path: "/sda/yxyang/qsba_workspace/mbeir_aligned/data/nights_task4/image_embeddings.pt"
  embed_dim: 768
  device: "cuda"
query_aware:
  alpha: 1.0
  l2_normalize: true
  output_path: "outputs/query_aware_emb.pt"
sinkhorn:
  K: 128
  M: 8
  epsilon: 0.01
  n_sinkhorn_iters: 5
  n_em_iters: 30
  init: "kmeans++"
  output_path: "outputs/assignment.pt"
router:
  hidden_dim: 512
  n_layers: 2
  dropout: 0.1
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 256
  epochs: 30
  val_split: 0.1
  output_path: "outputs/router.pt"
eval:
  top_B: [1, 3, 5]
  top_K: [1, 5, 10]
  candidate_pool_size: 40038
  rerank_with_dense: true
seed: 42
log_level: "INFO"
output_dir: "/sda/yxyang/qsba_workspace/mbeir_aligned/outputs/nights_task4"
