data:
  device: cuda
  embed_dim: 768
  image_emb_path: /sda/yxyang/qsba_workspace/mbeir_aligned/data/mscoco/image_embeddings.pt
  text_emb_path: /sda/yxyang/qsba_workspace/mbeir_aligned/data/mscoco/text_embeddings.pt
eval:
  candidate_pool_size: 5000
  rerank_with_dense: true
  top_B:
  - 1
  - 3
  - 5
  top_K:
  - 1
  - 5
  - 10
log_level: INFO
output_dir: /sda/yxyang/qsba_workspace/mbeir_aligned/outputs/mscoco
query_aware:
  alpha: 1.0
  l2_normalize: true
  output_path: outputs/query_aware_emb.pt
router:
  batch_size: 256
  dropout: 0.1
  epochs: 30
  hidden_dim: 512
  lr: 0.001
  n_layers: 2
  output_path: outputs/router.pt
  val_split: 0.1
  weight_decay: 0.0001
seed: 42
sinkhorn:
  K: 128
  M: 8
  epsilon: 0.01
  init: kmeans++
  n_em_iters: 30
  n_sinkhorn_iters: 5
  output_path: outputs/assignment.pt
